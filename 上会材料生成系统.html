<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>储能项目上会材料在线生成系统</title>
<style>
/* ========== RESET & BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',sans-serif;}
body{background:#F0F4F1;color:#262626;overflow:hidden;}

/* ========== DESIGN TOKENS (国家电网 State Grid) ========== */
/* Primary:   #007A3E (State Grid Green)                     */
/* Dark:      #005A2D                                        */
/* Medium:    #00963A                                        */
/* Light bg:  #EAF5EE                                        */
/* Border:    #D5E6DC                                        */
/* White:     #FFFFFF                                        */

/* ========== HEADER ========== */
.hdr{height:50px;background:#007A3E;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  border-bottom:3px solid #005A2D;position:relative;z-index:50;}
.hdr-logo{display:flex;align-items:center;gap:10px;}
.hdr-logo-icon{width:30px;height:30px;background:rgba(255,255,255,.18);border-radius:4px;
  display:flex;align-items:center;justify-content:center;font-size:15px;}
.hdr-logo-text{font-size:14px;font-weight:700;color:#fff;letter-spacing:.04em;}
.hdr-logo-sub{font-size:10px;color:rgba(255,255,255,.65);margin-top:1px;}
.hdr-actions{display:flex;gap:8px;align-items:center;}
.hdr-slide-info{font-size:11px;color:rgba(255,255,255,.6);margin-right:6px;}

/* ========== LAYOUT ========== */
.app-body{display:flex;height:calc(100vh - 50px);}

/* ========== SIDEBAR ========== */
.sidebar{width:168px;background:#fff;border-right:1px solid #D5E6DC;overflow-y:auto;
  padding:10px 6px;flex-shrink:0;}
.sb-label{font-size:10px;color:#8C8C8C;letter-spacing:.08em;text-transform:uppercase;
  padding:0 8px;margin-bottom:8px;font-weight:600;}
.sli-item{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:4px;
  cursor:pointer;transition:all .15s;margin-bottom:2px;border:1px solid transparent;}
.sli-item:hover{background:#EAF5EE;border-color:#B8DECA;}
.sli-item.active{background:#EAF5EE;border-color:#007A3E;border-left:3px solid #007A3E;}
.sli-item[draggable="true"]{cursor:grab;}
.sli-item[draggable="true"]:active{cursor:grabbing;}
.sli-item.drag-over{border-top:2px solid #007A3E !important;background:#EAF5EE;}
.sli-item.drag-ghost{opacity:.4;}
.sli-num{min-width:22px;height:22px;border-radius:50%;background:#007A3E;color:#fff;
  font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.sli-item.active .sli-num{background:#005A2D;}
.sli-name{font-size:11px;color:#3D3D3D;line-height:1.35;}
.sli-item.active .sli-name{color:#005A2D;font-weight:600;}
.sb-progress{padding:12px 8px 6px;}
.sb-prog-bar{height:4px;background:#E8E8E8;border-radius:2px;overflow:hidden;}
.sb-prog-fill{height:100%;background:linear-gradient(90deg,#005A2D,#00963A);transition:width .4s;}
.sb-prog-txt{font-size:10px;color:#8C8C8C;margin-top:5px;}
.sb-divider{height:1px;background:#E8F0EB;margin:8px 6px;}

/* ========== MAIN AREA ========== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOOLBAR */
.toolbar{height:40px;background:#fff;border-bottom:1px solid #E0E8E3;
  display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.tb-dots{display:flex;gap:5px;align-items:center;}
.tb-dot{width:6px;height:6px;border-radius:50%;background:#D5E6DC;cursor:pointer;transition:all .2s;}
.tb-dot.active{background:#007A3E;transform:scale(1.4);}
.tb-sep{width:1px;height:20px;background:#E0E8E3;margin:0 4px;}
.tb-info{font-size:11px;color:#8C8C8C;}

/* EDITOR */
.editor{flex:1;display:flex;overflow:hidden;}

/* SLIDE CANVAS AREA */
.canvas-area{flex:1;display:flex;align-items:flex-start;justify-content:center;
  padding:16px;overflow:auto;background:#F0F4F1;}
.slide-wrap{width:100%;max-width:960px;}
.slide-outer{position:relative;width:100%;padding-top:56.25%;}
.slide-inner{position:absolute;top:0;left:0;right:0;bottom:0;
  background:#fff;border-radius:2px;overflow:hidden;
  box-shadow:0 1px 6px rgba(0,0,0,.12),0 0 0 1px rgba(0,100,50,.08);
  color:#1a1a1a;}

/* ========== SLIDE COMPONENTS ========== */
.sl-hdr{background:#007A3E;padding:0 22px;height:54px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;}
.sl-badge{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);
  color:#fff;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,.35);}
.sl-title{color:#fff;font-size:17px;font-weight:700;letter-spacing:.04em;flex:1;}
.sl-meta{font-size:9px;color:rgba(255,255,255,.55);text-align:right;line-height:1.5;}
.sl-body{padding:14px 20px;flex:1;overflow:hidden;position:relative;}
.sl-footer{position:absolute;bottom:5px;right:16px;font-size:8px;color:#ADADAD;}
/* green accent line under header */
.sl-hdr-line{height:2px;background:linear-gradient(90deg,#005A2D,#00963A,#E8F5EE);}

/* Info table */
.tbl{width:100%;border-collapse:collapse;font-size:11px;}
.tbl td{padding:5px 8px;border:1px solid #E8E8E8;}
.tbl .lc{background:#F2FAF5;color:#005A2D;font-weight:600;width:32%;}
.tbl .vc{color:#333;}
.tbl th{background:#007A3E;color:#fff;padding:5px 8px;font-size:10px;font-weight:600;}
.tbl tbody tr:hover td{background:#F9FDFB;}

/* Info block */
.info-block{background:#F2FAF5;border-left:3px solid #007A3E;border-radius:0 3px 3px 0;
  padding:7px 10px;margin-bottom:7px;}
.info-block-title{font-size:10px;font-weight:700;color:#005A2D;margin-bottom:3px;}
.info-block-body{font-size:10px;color:#444;line-height:1.55;}

/* Policy block */
.policy-block{background:#F5FBF7;border-left:3px solid #007A3E;border-radius:0 3px 3px 0;
  padding:6px 10px;margin-bottom:7px;}
.policy-title{font-size:10px;font-weight:700;color:#005A2D;margin-bottom:3px;}
.policy-content{font-size:9px;color:#555;line-height:1.55;}

/* Metric cards */
.mcard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.mcard{background:#fff;border:1px solid #D5E6DC;border-top:3px solid #007A3E;
  border-radius:3px;padding:9px 10px;text-align:center;}
.mcard-val{font-size:18px;font-weight:800;color:#007A3E;}
.mcard-lbl{font-size:9px;color:#8C8C8C;margin-top:2px;}

/* Image placeholder — overflow:hidden + absolute img for reliable cropping */
.img-ph{background:#F5FAF7;border:1.5px dashed #B8DECA;border-radius:3px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#A0C0AE;font-size:10px;gap:4px;
  position:relative;overflow:hidden;}
.img-ph img{position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center center;border-radius:2px;}
/* Image with caption wrapper */
.img-wrap{display:flex;flex-direction:column;gap:0;}
.img-cap{font-size:8px;color:#8C8C8C;text-align:center;padding:2px 0;
  background:#F9FDFB;border:1px solid #E0EAE5;border-top:none;
  border-radius:0 0 3px 3px;flex-shrink:0;}

/* ── Draggable / Resizable Image Overlay ── */
.dimg{position:absolute;cursor:move;user-select:none;z-index:20;
  border-radius:4px;border:1.5px solid #B8DECA;overflow:visible;
  box-shadow:0 2px 8px rgba(0,0,0,.12);}
.dimg:hover{border-color:#007A3E;box-shadow:0 3px 14px rgba(0,122,62,.22);}
.dimg.dimg-active{border-color:#007A3E;box-shadow:0 4px 20px rgba(0,122,62,.32);opacity:.94;}
.dimg img{width:100%;height:100%;object-fit:contain;display:block;
  border-radius:3px;pointer-events:none;background:#fff;}
.dimg-ph{position:absolute;cursor:default;z-index:18;
  background:#F5FAF7;border:1.5px dashed #C0DDD0;border-radius:4px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#A8C8B8;font-size:10px;gap:5px;pointer-events:none;}
.dimg-cap{position:absolute;bottom:-18px;left:0;right:0;text-align:center;
  font-size:8px;color:#8C8C8C;white-space:nowrap;pointer-events:none;}
/* Resize handles — 8-point */
.rh{position:absolute;width:10px;height:10px;background:#007A3E;
  border:1.5px solid #fff;border-radius:2px;z-index:21;
  opacity:0;transition:opacity .15s;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.dimg:hover .rh,.dimg.dimg-active .rh{opacity:1;}
.rh-nw{top:-5px;left:-5px;cursor:nw-resize;}
.rh-ne{top:-5px;right:-5px;cursor:ne-resize;}
.rh-sw{bottom:-5px;left:-5px;cursor:sw-resize;}
.rh-se{bottom:-5px;right:-5px;cursor:se-resize;}
.rh-n{top:-5px;left:calc(50% - 5px);cursor:n-resize;}
.rh-s{bottom:-5px;left:calc(50% - 5px);cursor:s-resize;}
.rh-e{right:-5px;top:calc(50% - 5px);cursor:e-resize;}
.rh-w{left:-5px;top:calc(50% - 5px);cursor:w-resize;}

/* ── Draggable Text Block ── */
.dtb{position:absolute;cursor:move;user-select:none;z-index:20;overflow:visible;box-sizing:border-box;}
.dtb:hover .rh,.dtb.dtb-active .rh{opacity:1;}
.dtb.dtb-active .dtb-inner{box-shadow:0 4px 20px rgba(0,122,62,.25);}
.dtb-inner{background:#F5FBF7;border-left:3px solid #007A3E;border-radius:0 4px 4px 0;
  padding:7px 10px;height:100%;box-sizing:border-box;overflow:hidden;
  border:1px solid #D5E6DC;border-left-width:3px;}
.dtb:hover .dtb-inner{box-shadow:0 2px 10px rgba(0,122,62,.15);}
.dtb-heading{font-size:10px;font-weight:700;color:#005A2D;margin-bottom:3px;line-height:1.45;}
.dtb-content{font-size:9px;color:#555;line-height:1.6;white-space:pre-wrap;}

/* Cooperation steps */
.coop-step{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.step-num{min-width:20px;height:20px;border-radius:50%;background:#007A3E;color:#fff;
  font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-text{font-size:10px;color:#333;line-height:1.5;}

/* Sum row */
.sum-row td{background:#EAF5EE;font-weight:700;color:#005A2D;border-top:2px solid #007A3E;}

/* Cover slide */
.cover-slide{height:100%;background:#007A3E;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:28px;position:relative;overflow:hidden;}
.cover-geo1{position:absolute;top:-50px;right:-50px;width:200px;height:200px;
  border-radius:50%;background:rgba(255,255,255,.05);}
.cover-geo2{position:absolute;top:-20px;right:-20px;width:140px;height:140px;
  border-radius:50%;background:rgba(255,255,255,.04);}
.cover-geo3{position:absolute;bottom:-60px;left:-40px;width:220px;height:220px;
  border-radius:50%;background:rgba(0,0,0,.06);}
.cover-strip{position:absolute;bottom:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,#FFD700 0%,#FFF 30%,rgba(255,255,255,0) 70%);}
.cover-logo-ph{width:72px;height:72px;border-radius:8px;
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:14px;}
.cover-company{font-size:11px;color:rgba(255,255,255,.7);margin-bottom:5px;letter-spacing:.05em;}
.cover-divider{width:60px;height:1px;background:rgba(255,255,255,.3);margin:10px auto;}
.cover-title{font-size:19px;font-weight:800;color:#fff;line-height:1.35;margin-bottom:10px;letter-spacing:.02em;}
.cover-tag{display:inline-block;padding:3px 10px;background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);border-radius:2px;font-size:9px;color:rgba(255,255,255,.85);margin:2px;}
.cover-date{position:absolute;bottom:12px;right:18px;font-size:9px;color:rgba(255,255,255,.45);}

/* Revenue summary card */
.rev-total{background:#007A3E;border-radius:4px;padding:14px 16px;text-align:center;margin-top:8px;}
.rev-total-lbl{font-size:9px;color:rgba(255,255,255,.7);margin-bottom:4px;}
.rev-total-val{font-size:24px;font-weight:800;color:#fff;}
.rev-item{background:#fff;border:1px solid #D5E6DC;border-top:2px solid #007A3E;
  border-radius:3px;padding:8px 10px;margin-bottom:7px;}
.rev-item-lbl{font-size:9px;color:#007A3E;font-weight:700;margin-bottom:3px;}
.rev-item-formula{font-size:9px;color:#666;line-height:1.4;margin-bottom:4px;}
.rev-item-val{font-size:15px;font-weight:800;color:#007A3E;}

/* Doc status */
.doc-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:3px;
  border:1px solid #E8E8E8;margin-bottom:5px;}
.doc-row.ok{background:#F2FAF5;border-color:#B8DECA;}
.doc-row.wip{background:#FFFBF0;border-color:#F5D87A;}
.doc-row.no{background:#FFF5F5;border-color:#F0BABA;}

/* ========== FORM PANEL ========== */
.form-panel{width:340px;background:#FAFCFB;border-left:1px solid #D5E6DC;
  overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;}
.fp-hdr{padding:10px 14px;background:#007A3E;color:#fff;
  font-size:12px;font-weight:600;flex-shrink:0;letter-spacing:.02em;}
.fp-sec{padding:11px 14px;border-bottom:1px solid #EBF2EE;}
.fp-sec-title{font-size:10px;color:#007A3E;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:9px;font-weight:700;}
.fg{margin-bottom:9px;}
.fl{display:block;font-size:10px;color:#595959;margin-bottom:3px;font-weight:500;}
.fi{width:100%;padding:6px 9px;background:#fff;border:1px solid #D0D0D0;
  border-radius:3px;color:#262626;font-size:11px;font-family:inherit;transition:border .18s;}
.fi:focus{outline:none;border-color:#007A3E;box-shadow:0 0 0 2px rgba(0,122,62,.1);}
.fi.ta{resize:vertical;min-height:54px;}
.fi.sm{min-height:36px;}

/* Upload */
.upload-btn{width:100%;padding:10px;background:#fff;border:1.5px dashed #B8DECA;
  border-radius:3px;text-align:center;cursor:pointer;transition:all .18s;color:#8C8C8C;font-size:11px;}
.upload-btn:hover{border-color:#007A3E;color:#007A3E;background:#F2FAF5;}
.upload-btn.has-img{border-style:solid;border-color:#007A3E;background:#F2FAF5;}
.upload-btn.drag-over{border-color:#007A3E;border-style:solid;background:#EAF5EE;
  color:#007A3E;transform:scale(1.01);box-shadow:0 0 0 3px rgba(0,122,62,.15);}
.upload-preview{max-width:100%;max-height:70px;object-fit:contain;display:block;
  margin:4px auto 0;border-radius:2px;}

/* Dynamic rows */
.dyn-row{background:#fff;border:1px solid #E0EAE5;border-radius:3px;padding:8px;margin-bottom:7px;}
.dyn-row-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.dyn-row-lbl{font-size:10px;color:#8C8C8C;}
.del-btn{width:18px;height:18px;border-radius:2px;background:#FFF0F0;border:none;
  color:#CC3333;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;}
.del-btn:hover{background:#FFD5D5;}
.add-btn{width:100%;padding:6px;background:#fff;border:1px dashed #B8DECA;
  border-radius:3px;color:#007A3E;cursor:pointer;font-size:11px;transition:all .18s;font-weight:500;}
.add-btn:hover{border-color:#007A3E;background:#EAF5EE;}

/* Calc display */
.calc-box{background:#EAF5EE;border:1px solid #B8DECA;border-radius:3px;padding:7px 10px;
  font-size:11px;color:#005A2D;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.calc-lbl{font-size:9px;color:#6B8E7A;font-weight:400;}
.calc-total{background:#007A3E;border-radius:3px;padding:9px 12px;
  display:flex;justify-content:space-between;align-items:center;}
.calc-total-lbl{font-size:10px;color:rgba(255,255,255,.7);}
.calc-total-val{font-size:15px;font-weight:800;color:#fff;}

/* Buttons */
.btn{padding:6px 14px;border-radius:3px;border:none;cursor:pointer;
  font-size:11px;font-family:inherit;font-weight:600;transition:all .18s;
  display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:#007A3E;color:#fff;}
.btn-primary:hover{background:#005A2D;}
.btn-secondary{background:#fff;color:#007A3E;border:1px solid #007A3E;}
.btn-secondary:hover{background:#EAF5EE;}
.btn-ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.3);}
.btn-ghost:hover{background:rgba(255,255,255,.22);}
.btn-sm{padding:5px 11px;font-size:11px;}

/* Full screen preview */
#preview-modal{display:none;position:fixed;inset:0;background:#1a1a1a;z-index:200;flex-direction:column;}
.pm-hdr{height:48px;background:#007A3E;border-bottom:2px solid #005A2D;display:flex;
  align-items:center;padding:0 18px;gap:12px;flex-shrink:0;}
.pm-body{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:auto;background:#1a1a1a;}
.pm-slide{width:100%;max-width:1200px;aspect-ratio:16/9;background:#fff;position:relative;overflow:hidden;
  border-radius:2px;box-shadow:0 8px 40px rgba(0,0,0,.6);color:#1a1a1a;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#F0F4F1;}
::-webkit-scrollbar-thumb{background:#B8DECA;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#007A3E;}

/* ========== AUTH SCREEN ========== */
#authScreen{position:fixed;inset:0;z-index:9999;
  background:linear-gradient(145deg,#003A20 0%,#005A2D 40%,#007A3E 75%,#00963A 100%);
  display:flex;align-items:center;justify-content:center;}
#authScreen::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 80%,rgba(255,255,255,.04) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(255,255,255,.06) 0%,transparent 50%);
  pointer-events:none;}
.auth-card{background:#fff;border-radius:14px;padding:38px 34px 28px;width:370px;
  box-shadow:0 24px 64px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.08);position:relative;z-index:1;}
.auth-logo{font-size:38px;text-align:center;margin-bottom:6px;}
.auth-brand{font-size:14px;font-weight:800;color:#003A20;text-align:center;letter-spacing:.02em;}
.auth-brand-sub{font-size:10px;color:#9AB5A5;text-align:center;margin-top:3px;margin-bottom:22px;}
.auth-tabs{display:flex;background:#F0F4F1;border-radius:7px;padding:3px;margin-bottom:20px;gap:3px;}
.auth-tab{flex:1;border:none;background:none;padding:8px 0;font-size:13px;font-weight:600;
  border-radius:5px;cursor:pointer;color:#7A9E8C;transition:all .18s;}
.auth-tab.active{background:#007A3E;color:#fff;box-shadow:0 2px 6px rgba(0,122,62,.3);}
.auth-input{width:100%;padding:11px 13px;border:1.5px solid #D5E6DC;border-radius:7px;
  font-size:13px;outline:none;margin-bottom:10px;transition:border-color .15s;font-family:inherit;
  box-sizing:border-box;}
.auth-input:focus{border-color:#007A3E;box-shadow:0 0 0 3px rgba(0,122,62,.1);}
.auth-err{font-size:11px;color:#D32F2F;min-height:16px;margin-bottom:4px;padding-left:2px;}
.auth-ok{font-size:11px;color:#007A3E;min-height:16px;margin-bottom:4px;padding-left:2px;}
.auth-btn{width:100%;background:#007A3E;color:#fff;border:none;border-radius:7px;
  padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;
  transition:background .15s,box-shadow .15s;letter-spacing:.04em;}
.auth-btn:hover{background:#005A2D;box-shadow:0 4px 12px rgba(0,122,62,.35);}
.auth-footer{font-size:10px;color:#B8D0C0;text-align:center;margin-top:18px;line-height:1.7;}
.auth-divider{height:1px;background:#EEF5F1;margin:10px 0 14px;}
.user-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;
  color:rgba(255,255,255,.75);background:rgba(255,255,255,.12);border-radius:4px;
  padding:4px 10px;margin-right:4px;}

/* ========== PROJECT DASHBOARD ========== */
#dashboard{display:none;flex:1;overflow-y:auto;padding:32px 40px;background:#F0F4F1;}
.dash-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.dash-title{font-size:20px;font-weight:700;color:#004E28;}
.dash-subtitle{font-size:12px;color:#7A9E8C;margin-top:2px;}
.dash-new-btn{background:#007A3E;color:#fff;border:none;border-radius:6px;
  padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:background .15s;}
.dash-new-btn:hover{background:#005A2D;}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.proj-card{background:#fff;border:1.5px solid #D6EBE1;border-radius:8px;padding:18px 18px 14px;
  transition:box-shadow .15s,border-color .15s;position:relative;overflow:hidden;}
.proj-card:not(.proj-card-archived):hover{box-shadow:0 4px 16px rgba(0,122,62,.12);border-color:#007A3E;}
.proj-card-accent{position:absolute;left:0;top:0;bottom:0;width:4px;background:#007A3E;border-radius:4px 0 0 4px;}
.proj-card-name{font-size:14px;font-weight:700;color:#004E28;margin-bottom:4px;padding-left:6px;line-height:1.4;}
.proj-card-cap{font-size:11px;color:#007A3E;font-weight:600;padding-left:6px;margin-bottom:6px;}
.proj-card-meta{font-size:10px;color:#9AB;padding-left:6px;margin-bottom:12px;}
.proj-card-actions{display:flex;gap:6px;padding-left:4px;}
.proj-btn{border:1px solid #D6EBE1;border-radius:4px;padding:4px 10px;font-size:11px;
  cursor:pointer;background:#fff;color:#555;transition:all .12s;}
.proj-btn:hover{background:#EAF5EE;border-color:#007A3E;color:#007A3E;}
.proj-btn-open{background:#007A3E;color:#fff;border-color:#007A3E;}
.proj-btn-open:hover{background:#005A2D;}
.proj-btn-arch{color:#E87722;border-color:#F5D5B0;}
.proj-btn-arch:hover{background:#FFF7EE;border-color:#E87722;}
.proj-btn-restore{color:#007A3E;border-color:#B8DECA;}
.proj-empty{text-align:center;padding:60px 20px;color:#B0C8BC;}
.proj-empty-icon{font-size:48px;margin-bottom:12px;}
.proj-arch-section{margin-top:28px;border-top:1px dashed #D6EBE1;padding-top:16px;}
.proj-arch-title{font-size:11px;color:#9AB;margin-bottom:12px;cursor:pointer;user-select:none;}
.proj-card-archived{opacity:.6;border-style:dashed;}
.proj-card-archived .proj-card-accent{background:#B0C8BC;}
.dash-data-btn{background:#fff;color:#555;border:1.5px solid #D5E6DC;border-radius:6px;
  padding:9px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.dash-data-btn:hover{background:#EAF5EE;border-color:#007A3E;color:#007A3E;}
.dash-topbar-right{display:flex;align-items:center;gap:8px;}
.btn-back{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);
  border-radius:4px;padding:5px 12px;font-size:11px;cursor:pointer;display:none;}
.btn-back:hover{background:rgba(255,255,255,.25);}

<!-- AUTH SCREEN -->
<div id="authScreen" style="display:none;">
  <div class="auth-card">
    <div class="auth-logo"><img src="" id="authLogo" style="width:56px;height:56px;object-fit:contain;" onerror="this.parentElement.textContent='⚡'"></div>
    <div class="auth-brand">储能项目上会材料生成系统</div>
    <div class="auth-brand-sub">电网侧独立共享储能电站 · 投资决策委员会</div>
    <div class="auth-tabs">
      <button id="tabLogin" class="auth-tab active" onclick="switchTab('login')">登 录</button>
      <button id="tabReg"   class="auth-tab"        onclick="switchTab('reg')">注 册</button>
    </div>
    <!-- Login panel -->
    <div id="panelLogin">
      <input id="loginUser" class="auth-input" type="text"     placeholder="用户名"
             onkeydown="if(event.key==='Enter')$('loginPass').focus()">
      <input id="loginPass" class="auth-input" type="password" placeholder="密码"
             onkeydown="if(event.key==='Enter')doLogin()">
      <div id="loginErr" class="auth-err"></div>
      <button class="auth-btn" onclick="doLogin()">登 录</button>
    </div>
    <!-- Register panel -->
    <div id="panelReg" style="display:none;">
      <input id="regUser"  class="auth-input" type="text"     placeholder="用户名（2–20 个字符）"
             onkeydown="if(event.key==='Enter')$('regPass').focus()">
      <input id="regPass"  class="auth-input" type="password" placeholder="密码（至少 6 位）"
             onkeydown="if(event.key==='Enter')$('regPass2').focus()">
      <input id="regPass2" class="auth-input" type="password" placeholder="确认密码"
             onkeydown="if(event.key==='Enter')doRegister()">
      <div id="regErr" class="auth-err"></div>
      <button class="auth-btn" onclick="doRegister()">注 册</button>
    </div>
    <div class="auth-footer">数据仅保存在本设备浏览器 · 安全私密 · 无需联网</div>
  </div>
</div>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-logo">
    <div class="hdr-logo-icon" style="overflow:hidden;padding:2px;"><img id="hdrLogo" src="" style="width:100%;height:100%;object-fit:contain;" onerror="this.style.display='none'"></div>
    <div>
      <div class="hdr-logo-text">储能项目上会材料在线生成系统</div>
      <div class="hdr-logo-sub">电网侧独立共享储能电站 · 投资决策委员会</div>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="btn-back" id="btnBack" onclick="backToDashboard()">← 项目列表</button>
    <span class="hdr-slide-info" id="hdrInfo"></span>
    <button class="btn btn-ghost btn-sm" id="btnPreview" onclick="previewAll()">👁 全屏预览</button>
    <button class="btn btn-ghost btn-sm" id="btnExport" onclick="exportHTML()">📋 生成报告</button>
    <button class="btn btn-ghost btn-sm" id="btnPrint" onclick="printAll()">🖨 打印/导出</button>
    <span class="user-badge" id="userBadge" style="display:none;"></span>
    <button class="btn btn-ghost btn-sm" id="btnLogout" style="display:none;" onclick="doLogout()">退出登录</button>
  </div>
</header>

<!-- PROJECT DASHBOARD -->
<div id="dashboard">
  <div class="dash-topbar">
    <div>
      <div class="dash-title">📂 项目管理</div>
      <div class="dash-subtitle">所有项目数据本地保存，永久保留</div>
    </div>
    <div class="dash-topbar-right">
      <button class="dash-data-btn" onclick="importData()" title="从备份文件恢复数据">📥 导入备份</button>
      <button class="dash-data-btn" onclick="exportData()" title="将所有数据导出为 JSON 文件">📤 导出备份</button>
      <button class="dash-new-btn" onclick="createNewProject()">＋ 新建项目</button>
    </div>
  </div>
  <div class="proj-grid" id="projGrid"></div>
  <div class="proj-arch-section" id="archSection" style="display:none;">
    <div class="proj-arch-title" onclick="toggleArchived()">▼ 已归档项目（点击展开）</div>
    <div class="proj-grid" id="archGrid" style="display:none;margin-top:8px;"></div>
  </div>
</div>

<div class="app-body" id="appBody">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-label">上会大纲</div>
  <div id="slideNav"></div>
  <div class="sb-divider"></div>
  <div class="sb-progress">
    <div class="sb-prog-bar"><div class="sb-prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="sb-prog-txt" id="progTxt">填写进度 0%</div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="toolbar">
    <button class="btn btn-secondary btn-sm" onclick="prevSlide()">◀ 上一页</button>
    <div class="tb-dots" id="tbDots"></div>
    <button class="btn btn-secondary btn-sm" onclick="nextSlide()">下一页 ▶</button>
    <div class="tb-sep"></div>
    <span class="tb-info" id="tbInfo"></span>
  </div>
  <div class="editor">
    <div class="canvas-area">
      <div class="slide-wrap">
        <div class="slide-outer">
          <div class="slide-inner" id="slideCanvas"></div>
        </div>
      </div>
    </div>
    <div class="form-panel" id="formPanel"></div>
  </div>
</main>

</div>

<div id="preview-modal">
  <div class="pm-hdr">
    <button class="btn btn-ghost btn-sm" onclick="prevPM()">◀ 上一页</button>
    <span style="font-size:11px;color:rgba(255,255,255,.7);" id="pmInfo"></span>
    <button class="btn btn-ghost btn-sm" onclick="nextPM()">下一页 ▶</button>
    <div style="flex:1"></div>
    <button class="btn btn-ghost btn-sm" onclick="printAll()">🖨 打印</button>

  </div>
  <div class="pm-body">
    <div class="pm-slide" id="pmSlide"></div>
  </div>
</div>

function getSlides(){
  const cs=(D.customSlides||[]);

  // Map of ALL content slide definitions (excludes s0 / sMenu)
  const contentDefs={};
  FIXED_SLIDES_BASE.filter(s=>!['s0','sMenu'].includes(s.id)).forEach(s=>{

  });

    contentDefs[c.id]={

      short:(c.title||'自定义').slice(0,5),
      desc:c.textBlocks&&c.textBlocks[0]&&c.textBlocks[0].heading
        ?c.textBlocks[0].heading.slice(0,16):'自定义内容',
      isCustom:true, customData:c
    };
  });

  // Determine ordered list of content slide IDs
  let order;
  const saved=D.slideOrder;
  if(saved&&saved.length>=1){
    // use saved order (filter to valid IDs only)
    order=saved.filter(id=>contentDefs[id]);
    // add any new slides missing from saved order
    const missing=Object.keys(contentDefs).filter(id=>!order.includes(id));
    if(missing.length){
      const s11pos=order.indexOf('s11');
      if(s11pos>=0) order=[...order.slice(0,s11pos),...missing,...order.slice(s11pos)];
      else order=[...order,...missing];
    }
  } else {
    // default: fixed slides in FIXED_SLIDES_BASE order, custom slides, s11 last
    const fixedContent=FIXED_SLIDES_BASE.filter(s=>!['s0','sMenu'].includes(s.id));
    const beforeLast=fixedContent.slice(0,-1).map(s=>s.id); // s1,s2,s3,s4,s8,s9,s12
    order=[...beforeLast,...cs.map(c=>c.id),'s11'];
  }

  // Build result array
  const result=[
    {id:'s0',   num:'封面', name:'封面', short:'封面', desc:'', isFixed:true},
    {id:'sMenu',num:'目录', name:'目录', short:'目录', desc:'', isFixed:true}
  ];
  order.forEach((id,i)=>{
    const s=contentDefs[id];
    if(!s) return;
    result.push({...s, num:CN_NUMS[i]});
  });
  return result;
}

function projectShortName(){
  const d=D.s0;
  if(d.projectName) return d.projectName;
  return (d.province||'')+(d.city||'')+(d.district||'')+(d.powerMW?d.powerMW+'MW/':'')+(d.capacityMWh?d.capacityMWh+'MWh储能电站':'（项目名称）');
}
function calcConsult(rate,mwh){
  if(!rate||!mwh) return '';
  return (parseFloat(rate)*parseFloat(mwh)*100).toFixed(0);
}
function calcLandTotal(unitPrice,area){
  if(!unitPrice||!area) return '';
  return (parseFloat(unitPrice)*parseFloat(area)).toFixed(0);
}
function calcPFR(days,power,times,price,perf){
  if(!days||!power||!times||!price||!perf) return '';
  return (parseFloat(power)*parseFloat(times)*parseFloat(price)*parseFloat(perf)*parseFloat(days)/10000).toFixed(2);
}
function calcEM(capacity,roundTrip,peakPrice,valleyPrice,days,times){
  if(!capacity||!roundTrip||!peakPrice||!valleyPrice||!days) return '';
  const cap=parseFloat(capacity)*1000*(parseFloat(times)||1);
  return ((cap*(parseFloat(roundTrip)/100)*parseFloat(peakPrice)-cap*parseFloat(valleyPrice))*parseFloat(days)/10000).toFixed(2);
}
function calcCapVal(power,standard,coeff){
  if(!power||!standard) return null;
  return (parseFloat(power)*1000*parseFloat(standard)/10000*(parseFloat(coeff)||1)).toFixed(2);
}
function calcCostTotal(){
  return D.s9.rows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
}
function escAttr(s){return String(s||'').replace(/"/g,'&quot;');}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getImgPos(key,dX,dY,dW,dH){
  return (D.imagePos&&D.imagePos[key]) ? D.imagePos[key] : {x:dX,y:dY,w:dW,h:dH};
}
const RH_DIRS=['nw','ne','sw','se','n','s','e','w'];
function draggableImg(key,url,dX,dY,dW,dH,caption){
  const p=getImgPos(key,dX,dY,dW,dH);
  const style=`left:${p.x}%;top:${p.y}%;width:${p.w}%;height:${p.h}%;`;
  const rhHtml=RH_DIRS.map(d=>`<div class="rh rh-${d}" data-dir="${d}"></div>`).join('');
  if(!url){

  }

// Drag/resize state
let _ds=null;
function initImgDrag(){
  const canvas=$('slideCanvas');
  canvas.addEventListener('mousedown',function(e){
    const rh=e.target.closest('.rh');
    // Handle both .dimg (images) and .dtb (text blocks)
    const el=e.target.closest('.dimg')||e.target.closest('.dtb');
    if(!el) return;
    const body=el.closest('.sl-body');
    if(!body) return;
    const br=body.getBoundingClientRect();
    const key=el.dataset.key;
    const p=getImgPos(key,
      parseFloat(el.dataset.dx),parseFloat(el.dataset.dy),
      parseFloat(el.dataset.dw),parseFloat(el.dataset.dh));
    _ds={key,br,el,mx:e.clientX,my:e.clientY,p0:{...p},dir:rh?rh.dataset.dir:'move'};
    el.classList.add(el.classList.contains('dimg')?'dimg-active':'dtb-active');
    e.preventDefault();e.stopPropagation();
  });
  document.addEventListener('mousemove',function(e){
    if(!_ds) return;
    const {key,br,el,mx,my,p0,dir}=_ds;
    const dx=(e.clientX-mx)/br.width*100, dy=(e.clientY-my)/br.height*100;
    let {x,y,w,h}=p0, min=4;
    if(dir==='move'){
      x=Math.max(-2,Math.min(94,x+dx));
      y=Math.max(-2,Math.min(92,y+dy));
    } else {
      if(dir.includes('e')) w=Math.max(min,p0.w+dx);
      if(dir.includes('s')) h=Math.max(min,p0.h+dy);
      if(dir.includes('w')){const nw=Math.max(min,p0.w-dx);x=p0.x+(p0.w-nw);w=nw;}
      if(dir.includes('n')){const nh=Math.max(min,p0.h-dy);y=p0.y+(p0.h-nh);h=nh;}
    }
    el.style.cssText=`left:${x}%;top:${y}%;width:${w}%;height:${h}%;`;
    if(!D.imagePos)D.imagePos={};
    D.imagePos[key]={x,y,w,h};
  });
  document.addEventListener('mouseup',function(){
    if(_ds){
      _ds.el.classList.remove('dimg-active');
      _ds.el.classList.remove('dtb-active');
      _ds=null;saveCurrentProject();
    }
  });
}

function renderS9(){
  const d=D.s9;
  const s1=D.s1;
  const s8=D.s8;
  // Auto values from upstream — land from s1, consult from s8 (合作条件) with s1 fallback
  const autoLand    = calcLandTotal(s1.landUnitPrice,s1.landArea);
  const consultRate = s8.consultRate||s1.consultRate;
  const consultMWh  = s8.consultMWh||s1.consultMWh;
  const autoConsult = calcConsult(consultRate,consultMWh);
  const validNum=v=>v&&v!='NaN'&&!isNaN(parseFloat(v));

  // Augment rows: override scale+amount for land/consult rows
  const augment=r=>{
    const nm=(r.name||'');
    if(nm.includes('土地')&&validNum(autoLand)){
      const scale=s1.landArea&&s1.landUnitPrice?`${s1.landArea}亩 × ${s1.landUnitPrice}万元/亩`:r.scale;
      return {...r,scale,amount:autoLand,_auto:true};
    }
    if((nm.includes('资源')||nm.includes('咨询'))&&validNum(autoConsult)){
      const scale=consultRate&&consultMWh?`${consultRate}元/Wh × ${consultMWh}MWh`:r.scale;
      return {...r,scale,amount:autoConsult,_auto:true};
    }
    return r;
  };

  const rows=d.rows.filter(r=>r.name||r.amount).map(augment);
  // Recalculate total from augmented rows
  const total=rows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);

  return shell(_curSlideNum,'项目经济性分析（费用）',`
  <div style="height:calc(100% - 8px);">
    <div style="font-size:10px;color:#007A3E;font-weight:600;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #D5E6DC;">

      </thead>
      <tbody>
        ${rows.length?rows.map(r=>`
          <tr>
            <td class="vc" style="text-align:center;">${r.seq}</td>
            <td class="vc">${r.name||'—'}</td>
            <td class="vc" style="font-size:9px;color:#666;">${r.scale||'—'}</td>
            <td class="vc" style="font-weight:700;color:#007A3E;">
              ${r.amount||'—'}
              ${r._auto?`<span style="font-size:7px;color:#A0C0AE;margin-left:3px;" title="自动引用前文数据">↗自动</span>`:''}
            </td>
          </tr>`).join('')
        :`<tr><td colspan="4" style="text-align:center;color:#C0C0C0;font-style:italic;padding:18px;">请在右侧添加费用明细</td></tr>`}
        ${total?`<tr class="sum-row">
          <td style="text-align:center;padding:6px 8px;">合计</td>
          <td colspan="2"></td>
          <td style="font-size:14px;padding:6px 8px;">${total.toFixed(0)}&nbsp;万元</td>
        </tr>`:''}
      </tbody>
    </table>
  </div>`);
}

function calcRevenueTotal(){
  return (D.s12.items||[]).reduce((sum,it)=>{
    const v=parseFloat(it.amount)||0;
    return sum + (it.deduct ? -v : v);
  },0);
}

function renderS12(){
  const items=D.s12.items||[];
  const total=calcRevenueTotal();
  const totalStr=total?total.toFixed(2):'—';
  const totalColor=total>0?'#007A3E':total<0?'#C62828':'#999';

  // ① 金额为空或为 0 时，自动隐藏该行
  const visItems=items.filter(it=>{
    const v=parseFloat(it.amount);
    return it.amount!==''&&!isNaN(v)&&v!==0;
  });

  const rows=visItems.map(it=>{
    const amt=parseFloat(it.amount);
    return `<tr style="${it.deduct?'background:#FFF8F8;':''}">
      <td class="vc" style="white-space:nowrap;font-size:9.5px;font-weight:${it.deduct?'600':'400'};color:${it.deduct?'#C62828':'#333'};padding:5px 10px;">
        ${escHtml(it.label)}${it.deduct?' <span style="font-size:8px;background:#FFEBEE;color:#C62828;border-radius:2px;padding:1px 4px;margin-left:4px;">扣减</span>':''}
      </td>
      <td class="vc" style="white-space:nowrap;text-align:right;font-size:10px;font-weight:600;padding:5px 14px;color:${it.deduct?'#C62828':'#222'};">
        ${(it.deduct?'− ':'+ ')+Math.abs(amt).toFixed(2)}
      </td>
      <td class="vc" style="font-size:8.5px;color:#777;padding:5px 10px;">${escHtml(it.notes||'')}</td>
    </tr>`;
  }).join('');

  const emptyRow=visItems.length===0
    ?`<tr><td colspan="3" style="text-align:center;color:#CCC;font-size:9px;padding:18px;">暂无收益数据，请在右侧填写</td></tr>`:'';

  // formula line: only non-zero items
  const incParts=items.filter(it=>!it.deduct&&parseFloat(it.amount)).map(it=>`+${parseFloat(it.amount).toFixed(2)}`).join(' ');
  const dedParts=items.filter(it=>it.deduct&&parseFloat(it.amount)).map(it=>` − ${parseFloat(it.amount).toFixed(2)}`).join('');

  return shell(_curSlideNum,'项目收益分析',`
  <div style="display:flex;flex-direction:column;gap:10px;height:calc(100% - 8px);">
    <!-- 总收益突出展示 -->
    <div style="background:linear-gradient(135deg,#005A2D,#007A3E);border-radius:6px;padding:12px 20px;
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <div>
        <div style="font-size:9px;color:rgba(255,255,255,.65);letter-spacing:.1em;">项目总收益（年）</div>
        <div style="font-size:28px;font-weight:800;color:#fff;line-height:1.15;letter-spacing:-.5px;">
          ${totalStr} <span style="font-size:13px;font-weight:400;opacity:.8;">万元</span>
        </div>
      </div>
      <div style="text-align:right;max-width:45%;">
        <div style="font-size:8px;color:rgba(255,255,255,.5);margin-bottom:4px;">= 各项收益之和 − 扣减项</div>
        <div style="font-size:9.5px;color:rgba(255,255,255,.7);word-break:break-all;">${incParts}${dedParts}</div>
      </div>
    </div>
    <!-- 明细表（金额为 0 或空的行自动隐藏）-->
    <div style="flex:1;overflow:auto;">
      <table class="tbl" style="font-size:10px;table-layout:auto;width:auto;min-width:100%;">
        <thead>
          <tr>
            <th style="white-space:nowrap;">收益项目</th>
            <th style="white-space:nowrap;text-align:right;">金额（万元/年）</th>
            <th>备注说明</th>
          </tr>
        </thead>
        <tbody>${rows||emptyRow}</tbody>
        <tfoot>
          <tr style="background:#F2FAF5;">
            <td style="white-space:nowrap;font-weight:700;font-size:10px;padding:6px 10px;color:#005A2D;">合计</td>
            <td style="white-space:nowrap;font-weight:800;font-size:11px;text-align:right;padding:6px 14px;color:${totalColor};">${totalStr}</td>
            <td style="padding:6px 10px;font-size:8.5px;color:#999;">万元/年</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>`);
}

function renderCustomSlide(cs,numLabel){
  if(!cs) return '<div>错误：自定义页面数据丢失</div>';
  const rhHtml=RH_DIRS.map(d=>`<div class="rh rh-${d}" data-dir="${d}"></div>`).join('');

  // Text blocks — draggable, policy-block styled
  const blocks=(cs.textBlocks||[]).map(tb=>{
    const key='tb_'+tb.id;
    const p=getImgPos(key,tb.x||5,tb.y||8,tb.w||88,tb.h||22);
    return `<div class="dtb" id="dtb_${tb.id}"
      data-key="${key}" data-dx="${tb.x||5}" data-dy="${tb.y||8}" data-dw="${tb.w||88}" data-dh="${tb.h||22}"
      style="left:${p.x}%;top:${p.y}%;width:${p.w}%;height:${p.h}%;">${rhHtml}
      <div class="dtb-inner">

    draggableImg(img.key,img.url,img.x||5,img.y||50,img.w||42,img.h||42,img.caption||'图片')

  return shell(numLabel,cs.title||'自定义页面',blocks.join('')+imgs.join(''));
}

function renderSlide(idx){
  const slides=getSlides();
  const s=slides[idx]; if(!s) return '';
  _curSlideNum=s.num; // let every renderer read the live number
  const map={s0:renderS0,sMenu:renderSMenu,s1:renderS1,s2:renderS2,s3:renderS3,
             s4:renderS4,s8:renderS8,s9:renderS9,s12:renderS12,s11:renderS11};
  if(map[s.id]) return map[s.id]();
  if(s.isCustom) return renderCustomSlide(s.customData,s.num);
  return '<div>未知页面</div>';
}

function fi(key,sk,ph,type='text'){
  const val=(D[sk]&&D[sk][key]!==undefined)?D[sk][key]:'';
  return `<input class="fi" type="${type}" placeholder="${ph}" value="${escAttr(val)}"
    onchange="upd('${sk}','${key}',this.value)" oninput="upd('${sk}','${key}',this.value)">`;
}
function ta(key,sk,ph,rows=2){
  const val=(D[sk]&&D[sk][key]!==undefined)?D[sk][key]:'';
  return `<textarea class="fi ta sm" style="min-height:${rows*22+12}px" placeholder="${ph}"
    onchange="upd('${sk}','${key}',this.value)" oninput="upd('${sk}','${key}',this.value)">${escHtml(val)}</textarea>`;
}
function sel(key,sk,opts){
  const val=(D[sk]&&D[sk][key]!==undefined)?D[sk][key]:'';
  return `<select class="fi" onchange="upd('${sk}','${key}',this.value)">
    ${opts.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}
  </select>`;
}
function fg(lbl,inp){return `<div class="fg"><label class="fl">${lbl}</label>${inp}</div>`;}
function sec(title,content){return `<div class="fp-sec"><div class="fp-sec-title">${title}</div>${content}</div>`;}
function uploadFG(lbl,sk,fk){
  const url=D[sk]&&D[sk][fk+'Url']?D[sk][fk+'Url']:'';
  return `<div class="fg"><label class="fl">${lbl}</label>
    <div class="upload-btn ${url?'has-img':''}"
      onclick="trigUpload('${sk}','${fk}')"
      ondragover="event.preventDefault();event.stopPropagation();this.classList.add('drag-over')"
      ondragleave="event.stopPropagation();this.classList.remove('drag-over')"
      ondrop="event.preventDefault();event.stopPropagation();this.classList.remove('drag-over');handleImgDrop(event,'${sk}','${fk}')">
      ${url?`<img class="upload-preview" src="${url}"><div style="font-size:9px;color:#007A3E;margin-top:3px;">✅ 已上传 — 点击或拖入更换</div>`
           :`<div>📁 点击上传 / 直接拖入图片</div>`}
    </div>
    <input type="file" accept="image/*" id="upf_${sk}_${fk}" style="display:none" onchange="handleUp('${sk}','${fk}',this)">
  </div>`;
}
function handleImgDrop(e,sk,fk){
  const file=e.dataTransfer&&e.dataTransfer.files[0];
  if(!file||!file.type.startsWith('image/')) return;
  const r=new FileReader();
  r.onload=ev=>{D[sk][fk+'Url']=ev.target.result;refresh();refreshForm();};
  r.readAsDataURL(file);
}
function calcBox(lbl,val,unit='万元'){
  return `<div class="calc-box"><span class="calc-lbl">${lbl}</span><span>${val?val+' '+unit:'待计算...'}</span></div>`;
}

  return `<div class="calc-total"><span class="calc-total-lbl">${lbl}</span><span class="calc-total-val">${val||'—'}</span></div>`;
}

function renderForm(idx){
  const slides=getSlides();
  const s=slides[idx]; if(!s) return '';
  const map={s0:renderF0,sMenu:renderFMenu,s1:renderF1,s2:renderF2,s3:renderF3,
             s4:renderF4,s8:renderF8,s9:renderF9,s12:renderF12,s11:renderF11};
  if(map[s.id]) return map[s.id]();
  if(s.isCustom) return renderFCustom(s.customData);
  return '<div class="fp-sec"><div class="fp-sec-title">无表单</div></div>';
}

// ── Custom slide mutations ──
function addCustomSlide(){
  if(!D.customSlides) D.customSlides=[];
  const csId='cs_'+Date.now();
  D.customSlides.push({
    id:csId, title:'自定义页面',
    textBlocks:[{id:'tb_'+Date.now(),heading:'',content:'',x:5,y:8,w:88,h:22}],
    extraImages:[]
  });
  saveCurrentProject();
  renderNav();
  const idx=getSlides().findIndex(s=>s.id===csId);
  if(idx>=0) goTo(idx);
}
function delCustomSlide(csId){
  if(!D.customSlides) return;
  const i=D.customSlides.findIndex(c=>c.id===csId);
  if(i===-1) return;
  // clean up imagePos for this slide
  const cs=D.customSlides[i];
  if(D.imagePos){
    (cs.textBlocks||[]).forEach(tb=>delete D.imagePos['tb_'+tb.id]);
    (cs.extraImages||[]).forEach(img=>delete D.imagePos[img.key]);
  }
  D.customSlides.splice(i,1);
  saveCurrentProject();
  renderNav();
  const sl=getSlides();
  goTo(Math.min(curIdx,sl.length-1));
}

function goTo(idx){curIdx=idx;renderNav();refresh();refreshForm();}
function prevSlide(){if(curIdx>0)goTo(curIdx-1);}
function nextSlide(){const sl=getSlides();if(curIdx<sl.length-1)goTo(curIdx+1);}

function renderNav(){
  const slides=getSlides();
  $('slideNav').innerHTML=slides.map((s,i)=>{
    const draggable=!['s0','sMenu'].includes(s.id);
    const dragAttrs=draggable
      ?`draggable="true" id="navItem_${s.id}"
        ondragstart="navDragStart(event,'${s.id}')"
        ondragover="navDragOver(event,'${s.id}',event)"
        ondrop="navDrop(event,'${s.id}')"
        ondragend="navDragEnd(event,'${s.id}')"
        ondragleave="navDragLeave(event)"`
      :`id="navItem_${s.id}"`;
    return `<div class="sli-item ${i===curIdx?'active':''}" ${dragAttrs} onclick="goTo(${i})" style="position:relative;">
      <div class="sli-num" title="${draggable?'拖动可调整顺序':''}">${s.num}</div>
      <div class="sli-name" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.short}</div>
      ${s.isCustom?`<button title="删除此页面" onclick="event.stopPropagation();if(confirm('删除「${s.name}」？'))delCustomSlide('${s.id}')"
        style="flex-shrink:0;background:none;border:none;color:#CCAAAA;cursor:pointer;font-size:13px;padding:0 2px;line-height:1;margin-left:2px;">×</button>`:''}
    </div>`;
  }).join('')+`
    <div class="sb-divider"></div>
    <div style="padding:2px 4px 8px;">
      <button class="add-btn" onclick="addCustomSlide()" style="font-size:10.5px;">＋ 新增自定义页面</button>
    </div>`;
  $('tbDots').innerHTML=slides.map((_,i)=>`<div class="tb-dot ${i===curIdx?'active':''}" onclick="goTo(${i})"></div>`).join('');
  const cur=slides[curIdx]||slides[0];
  $('tbInfo').textContent=`${cur.name}  （${curIdx+1} / ${slides.length}）`;
  $('hdrInfo').textContent=`第 ${curIdx+1} 页 / 共 ${slides.length} 页`;
}

// ══════════════════════════════════════════════
//  DRAG-TO-REORDER (sidebar)
// ══════════════════════════════════════════════
let _dragId=null;

function navDragStart(e,slideId){
  _dragId=slideId;
  e.dataTransfer.effectAllowed='move';
  // ghost on next tick (so element is still visible during drag)
  setTimeout(()=>{
    const el=document.getElementById('navItem_'+slideId);
    if(el) el.classList.add('drag-ghost');
  },0);
}

function navDragOver(e,slideId){
  e.preventDefault();
  if(!_dragId||_dragId===slideId) return;
  // clear all, then mark current target
  document.querySelectorAll('.sli-item.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const el=document.getElementById('navItem_'+slideId);
  if(el) el.classList.add('drag-over');
}

function navDragLeave(e){
  // only clear if leaving the item entirely (not into a child)
  const el=e.currentTarget;
  if(!el.contains(e.relatedTarget)) el.classList.remove('drag-over');
}

function navDrop(e,targetId){
  e.preventDefault();
  if(!_dragId||_dragId===targetId) return;

  const slides=getSlides();
  const contentOrder=slides.filter(s=>!['s0','sMenu'].includes(s.id)).map(s=>s.id);

  const fromIdx=contentOrder.indexOf(_dragId);
  const toIdx=contentOrder.indexOf(targetId);
  if(fromIdx===-1||toIdx===-1) return;

  const newOrder=[...contentOrder];
  newOrder.splice(fromIdx,1);
  newOrder.splice(toIdx,0,_dragId);

  D.slideOrder=newOrder;
  const movedId=_dragId;
  _dragId=null;

  saveCurrentProject();
  // stay on the dragged slide
  const newSlides=getSlides();
  const newIdx=newSlides.findIndex(s=>s.id===movedId);
  renderNav();
  if(newIdx>=0) goTo(newIdx);
}

function navDragEnd(e,slideId){
  const el=document.getElementById('navItem_'+slideId);
  if(el) el.classList.remove('drag-ghost');
  document.querySelectorAll('.sli-item.drag-over').forEach(el=>el.classList.remove('drag-over'));
  _dragId=null;
}

function updateProgress(){
  let filled=0,total=0;
  const check=obj=>{if(!obj)return;Object.values(obj).forEach(v=>{if(typeof v==='string'){total++;if(v.trim())filled++;}});};
  ['s0','s1','s3','s4','s5','s7','s8'].forEach(k=>check(D[k]));
  const pct=total>0?Math.round(filled/total*100):0;
  $('progFill').style.width=pct+'%';
  $('progTxt').textContent='填写进度 '+pct+'%';
}

document.addEventListener('keydown',e=>{
  if($('preview-modal').style.display==='flex'){
    if(e.key==='ArrowLeft')prevPM();
    if(e.key==='ArrowRight')nextPM();
    if(e.key==='Escape')closePM();
  } else {
    const tag=document.activeElement.tagName.toLowerCase();
    if(tag==='input'||tag==='textarea'||tag==='select') return;
    if(e.key==='ArrowLeft')prevSlide();
    if(e.key==='ArrowRight')nextSlide();
  }
});

const AUTH_KEY ='yichu_users';
const SESS_KEY ='yichu_session';

// 简单哈希（本地存储，非网络传输，满足隐私需求）
function hashPass(str){
  let h=5381;
  for(let i=0;i<str.length;i++) h=((h<<5)+h)^str.charCodeAt(i);
  return (h>>>0).toString(36);
}
function authUsers(){
  try{return JSON.parse(localStorage.getItem(AUTH_KEY)||'[]');}catch(e){return [];}
}
// ── 本地文件持久化（运行在 localhost 时自动同步到 yichu_data.json）──
const IS_LOCAL=['localhost','127.0.0.1'].includes(location.hostname);
let _syncTimer=null;
function _scheduleFileSync(){
  if(!IS_LOCAL) return;
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(()=>{
    const payload=JSON.stringify({
      _app:'yichu-meeting-gen',_version:'1.0',
      savedAt:new Date().toISOString(),
      users:authUsers(),projects:pmLoad()
    });
    fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:payload}).catch(()=>{});
  },600);
}
async function _loadFromFile(){
  if(!IS_LOCAL) return;
  try{
    const r=await fetch('/api/load');
    if(!r.ok) return;
    const d=await r.json();
    if(d.users)  localStorage.setItem(AUTH_KEY,JSON.stringify(d.users));
    if(d.projects) localStorage.setItem(PM_KEY,JSON.stringify(d.projects));
  }catch(e){}
}
function authSaveUsers(u){localStorage.setItem(AUTH_KEY,JSON.stringify(u));_scheduleFileSync();}
function getSession(){
  try{return JSON.parse(localStorage.getItem(SESS_KEY)||'null');}catch(e){return null;}
}
function setSession(s){localStorage.setItem(SESS_KEY,JSON.stringify(s));}
function clearSession(){localStorage.removeItem(SESS_KEY);}

function switchTab(tab){
  const isLogin=tab==='login';
  $('tabLogin').className='auth-tab'+(isLogin?' active':'');
  $('tabReg').className='auth-tab'+(!isLogin?' active':'');
  $('panelLogin').style.display=isLogin?'':'none';
  $('panelReg').style.display=isLogin?'none':'';
  $('loginErr').textContent='';
  $('regErr').textContent='';
}

function doLogin(){
  const u=$('loginUser').value.trim();
  const p=$('loginPass').value;
  const err=$('loginErr');
  if(!u||!p){err.textContent='请填写用户名和密码';return;}
  const users=authUsers();
  const found=users.find(x=>x.username===u&&x.passwordHash===hashPass(p));
  if(!found){err.textContent='用户名或密码错误，请检查后重试';return;}
  err.textContent='';
  setSession({userId:found.id,username:found.username});
  showApp();
}

function doRegister(){
  const u=$('regUser').value.trim();
  const p=$('regPass').value;
  const p2=$('regPass2').value;
  const err=$('regErr');
  if(!u){err.textContent='请填写用户名';return;}
  if(u.length<2||u.length>20){err.textContent='用户名须 2–20 个字符';return;}
  if(!p||p.length<6){err.textContent='密码须至少 6 位';return;}
  if(p!==p2){err.textContent='两次输入的密码不一致';return;}
  const users=authUsers();
  if(users.find(x=>x.username===u)){err.textContent='该用户名已被注册，请换一个';return;}
  const id='u_'+Date.now();
  users.push({id,username:u,passwordHash:hashPass(p),createdAt:new Date().toISOString()});
  authSaveUsers(users);
  err.textContent='';
  setSession({userId:id,username:u});
  showApp();
}

function doLogout(){
  if(!confirm(`确认退出「${getSession()?.username||''}」的登录？`)) return;
  saveCurrentProject();
  clearSession();
  currentProjectId=null;
  // 隐藏所有区域

  $('dashboard').style.display='none';

  $('hdrInfo').style.display='none';
  $('userBadge').style.display='none';
  $('btnLogout').style.display='none';
  // 重置登录表单
  $('loginUser').value='';$('loginPass').value='';$('loginErr').textContent='';
  switchTab('login');
  $('authScreen').style.display='flex';
}

function showApp(){

  $('userBadge').style.display='';

}

  const id='p_'+Date.now();
  const uid=getSession()?.userId||null;
  store.projects.unshift({
    id, name:name.trim(), userId:uid,
    createdAt:new Date().toLocaleDateString('zh-CN'),
    updatedAt:new Date().toLocaleDateString('zh-CN'),
    deleted:false,
    data:defaultData()
  });
  pmSave(store);
  openProject(id);
}

function openProject(id){
  const store=pmLoad();
  const proj=store.projects.find(p=>p.id===id);
  if(!proj) return;
  currentProjectId=id;
  // Load project data into D
  const saved=proj.data||{};
  Object.keys(D).forEach(k=>{
    if(saved[k]===undefined) return;
    if(Array.isArray(saved[k])){
      // Deep-replace arrays (covers customSlides, etc.)
      D[k]=JSON.parse(JSON.stringify(saved[k]));
    } else if(saved[k]&&typeof saved[k]==='object'){
      Object.assign(D[k],saved[k]);
    }
  });
  // Switch to editor view
  $('dashboard').style.display='none';
  $('appBody').style.display='flex';
  $('btnBack').style.display='inline-block';
  ['btnPreview','btnExport','btnPrint'].forEach(b=>$(b).style.display='');
  $('hdrInfo').style.display='';
  goTo(0); refresh(); refreshForm(); updateProgress();
}

function saveCurrentProject(){
  if(!currentProjectId) return;
  const store=pmLoad();
  const idx=store.projects.findIndex(p=>p.id===currentProjectId);
  if(idx===-1) return;
  store.projects[idx].data=JSON.parse(JSON.stringify(D));
  store.projects[idx].updatedAt=new Date().toLocaleDateString('zh-CN');
  // auto-update name if project name matches placeholder
  const projName=D.s1&&D.s1.address?'':store.projects[idx].name;
  if(D.s0&&D.s0.projectName&&D.s0.projectName!==store.projects[idx].name){
    // keep user-set project name unless it's a new placeholder
  }
  pmSave(store);
}

function archiveProject(id,e){
  e&&e.stopPropagation();
  if(!confirm('归档后项目将移至已归档区，数据永久保留，可随时恢复。确认归档？')) return;
  const store=pmLoad();
  const p=store.projects.find(q=>q.id===id);
  if(p) p.deleted=true;
  pmSave(store);
  renderDashboard();
}

function restoreProject(id,e){
  e&&e.stopPropagation();
  const store=pmLoad();
  const p=store.projects.find(q=>q.id===id);
  if(p) p.deleted=false;
  pmSave(store);
  renderDashboard();
}

function renameProject(id,e){
  e&&e.stopPropagation();
  const store=pmLoad();
  const p=store.projects.find(q=>q.id===id);
  if(!p) return;
  const name=prompt('修改项目名称：',p.name);
  if(name&&name.trim()){p.name=name.trim();pmSave(store);renderDashboard();}
}

function backToDashboard(){
  saveCurrentProject();
  currentProjectId=null;
  $('appBody').style.display='none';
  $('dashboard').style.display='block';
  $('btnBack').style.display='none';
  ['btnPreview','btnExport','btnPrint'].forEach(b=>$(b).style.display='none');
  $('hdrInfo').style.display='none';
  renderDashboard();
}

function renderDashboard(){
  const sess=getSession();
  const sub=document.querySelector('.dash-subtitle');
  if(sub) sub.textContent=sess?`当前用户：${sess.username} · 数据本地存储，永久保留`:'所有项目数据本地保存，永久保留';
  const active=getProjects(false);
  const archived=getProjects(true).filter(p=>p.deleted);
  const grid=$('projGrid');
  const cap=p=>{
    const d=p.data&&p.data.s1;
    return d&&d.powerMW?`${d.powerMW}MW / ${d.capacityMWh||'—'}MWh`:'规模待填写';
  };
  const cardHtml=(p,isArch=false)=>`
    <div class="proj-card ${isArch?'proj-card-archived':''}">
      <div class="proj-card-accent"></div>
      <div class="proj-card-name">${p.name}</div>
      <div class="proj-card-cap">⚡ ${cap(p)}</div>
      <div class="proj-card-meta">更新 ${p.updatedAt} · 建立 ${p.createdAt}</div>
      <div class="proj-card-actions">
        ${isArch
          ?`<button class="proj-btn proj-btn-restore" onclick="restoreProject('${p.id}',event)">↩ 恢复</button>`
          :`<button class="proj-btn proj-btn-open" onclick="openProject('${p.id}')">📂 打开</button>
            <button class="proj-btn" onclick="renameProject('${p.id}',event)">✏️ 改名</button>
            <button class="proj-btn proj-btn-arch" onclick="archiveProject('${p.id}',event)">📦 归档</button>`}
      </div>
    </div>`;
  grid.innerHTML=active.length
    ?active.map(p=>cardHtml(p)).join('')
    :`<div class="proj-empty"><div class="proj-empty-icon">📋</div><div>暂无项目，点击右上角「新建项目」开始</div></div>`;
  // Archived section
  const archSec=$('archSection');
  if(archived.length){
    archSec.style.display='block';
    $('archGrid').innerHTML=archived.map(p=>cardHtml(p,true)).join('');
  } else {
    archSec.style.display='none';
  }
}

let archVisible=false;
function toggleArchived(){
  archVisible=!archVisible;
  const g=$('archGrid');
  const t=document.querySelector('.proj-arch-title');
  g.style.display=archVisible?'grid':'none';
  t.textContent=(archVisible?'▲':'▼')+' 已归档项目（点击'+(archVisible?'收起':'展开')+'）';
}

// ══════════════════════════════════════════════
//  DATA EXPORT / IMPORT (便携备份)
// ══════════════════════════════════════════════
function exportData(){
  const payload={
    _app:'yichu-meeting-gen',
    _version:'1.0',
    exportedAt:new Date().toISOString(),
    users:authUsers(),
    projects:pmLoad()
  };
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const dateStr=new Date().toLocaleDateString('zh-CN').replace(/\//g,'-');
  a.download=`储能项目数据备份_${dateStr}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json,application/json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d._app!=='yichu-meeting-gen'||!d.projects) throw new Error('不是有效的备份文件');
        const uLen=(d.users||[]).length;
        const pLen=(d.projects.projects||[]).length;
        if(!confirm(`准备导入备份：\n👤 用户账号 ${uLen} 个\n📂 项目 ${pLen} 个\n\n⚠️ 将覆盖本设备所有现有数据，确认继续？`))return;
        if(d.users) localStorage.setItem(AUTH_KEY,JSON.stringify(d.users));
        pmSave(d.projects);
        clearSession();
        alert('✅ 导入成功！请用原账号重新登录。');
        location.reload();
      }catch(err){
        alert('❌ 导入失败：'+err.message);
      }
    };
    reader.readAsText(file,'utf-8');
  };
  input.click();
}
