<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>储能项目上会材料在线生成系统</title>
<style>
/* ========== RESET & BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',sans-serif;}
body{background:#F0F4F1;color:#262626;overflow:hidden;}

/* ========== DESIGN TOKENS (国家电网 State Grid) ========== */
/* Primary:   #007A3E (State Grid Green)                     */
/* Dark:      #005A2D                                        */
/* Medium:    #00963A                                        */
/* Light bg:  #EAF5EE                                        */
/* Border:    #D5E6DC                                        */
/* White:     #FFFFFF                                        */

/* ========== HEADER ========== */
.hdr{height:50px;background:#007A3E;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  border-bottom:3px solid #005A2D;position:relative;z-index:50;}
.hdr-logo{display:flex;align-items:center;gap:10px;}
.hdr-logo-icon{width:30px;height:30px;background:rgba(255,255,255,.18);border-radius:4px;
  display:flex;align-items:center;justify-content:center;font-size:15px;}
.hdr-logo-text{font-size:14px;font-weight:700;color:#fff;letter-spacing:.04em;}
.hdr-logo-sub{font-size:10px;color:rgba(255,255,255,.65);margin-top:1px;}
.hdr-actions{display:flex;gap:8px;align-items:center;}
.hdr-slide-info{font-size:11px;color:rgba(255,255,255,.6);margin-right:6px;}

/* ========== LAYOUT ========== */
.app-body{display:flex;height:calc(100vh - 50px);}

/* ========== SIDEBAR ========== */
.sidebar{width:168px;background:#fff;border-right:1px solid #D5E6DC;overflow-y:auto;
  padding:10px 6px;flex-shrink:0;}
.sb-label{font-size:10px;color:#8C8C8C;letter-spacing:.08em;text-transform:uppercase;
  padding:0 8px;margin-bottom:8px;font-weight:600;}
.sli-item{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:4px;
  cursor:pointer;transition:all .15s;margin-bottom:2px;border:1px solid transparent;}
.sli-item:hover{background:#EAF5EE;border-color:#B8DECA;}
.sli-item.active{background:#EAF5EE;border-color:#007A3E;border-left:3px solid #007A3E;}
.sli-num{min-width:22px;height:22px;border-radius:50%;background:#007A3E;color:#fff;
  font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.sli-item.active .sli-num{background:#005A2D;}
.sli-name{font-size:11px;color:#3D3D3D;line-height:1.35;}
.sli-item.active .sli-name{color:#005A2D;font-weight:600;}
.sb-progress{padding:12px 8px 6px;}
.sb-prog-bar{height:4px;background:#E8E8E8;border-radius:2px;overflow:hidden;}
.sb-prog-fill{height:100%;background:linear-gradient(90deg,#005A2D,#00963A);transition:width .4s;}
.sb-prog-txt{font-size:10px;color:#8C8C8C;margin-top:5px;}
.sb-divider{height:1px;background:#E8F0EB;margin:8px 6px;}

/* ========== MAIN AREA ========== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOOLBAR */
.toolbar{height:40px;background:#fff;border-bottom:1px solid #E0E8E3;
  display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.tb-dots{display:flex;gap:5px;align-items:center;}
.tb-dot{width:6px;height:6px;border-radius:50%;background:#D5E6DC;cursor:pointer;transition:all .2s;}
.tb-dot.active{background:#007A3E;transform:scale(1.4);}
.tb-sep{width:1px;height:20px;background:#E0E8E3;margin:0 4px;}
.tb-info{font-size:11px;color:#8C8C8C;}

/* EDITOR */
.editor{flex:1;display:flex;overflow:hidden;}

/* SLIDE CANVAS AREA */
.canvas-area{flex:1;display:flex;align-items:flex-start;justify-content:center;
  padding:16px;overflow:auto;background:#F0F4F1;}
.slide-wrap{width:100%;max-width:960px;}
.slide-outer{position:relative;width:100%;padding-top:56.25%;}
.slide-inner{position:absolute;top:0;left:0;right:0;bottom:0;
  background:#fff;border-radius:2px;overflow:hidden;
  box-shadow:0 1px 6px rgba(0,0,0,.12),0 0 0 1px rgba(0,100,50,.08);
  color:#1a1a1a;}

/* ========== SLIDE COMPONENTS ========== */
.sl-hdr{background:#007A3E;padding:0 22px;height:54px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;}
.sl-badge{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);
  color:#fff;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,.35);}
.sl-title{color:#fff;font-size:17px;font-weight:700;letter-spacing:.04em;flex:1;}
.sl-meta{font-size:9px;color:rgba(255,255,255,.55);text-align:right;line-height:1.5;}
.sl-body{padding:14px 20px;flex:1;overflow:hidden;position:relative;}
.sl-footer{position:absolute;bottom:5px;right:16px;font-size:8px;color:#ADADAD;}
/* green accent line under header */
.sl-hdr-line{height:2px;background:linear-gradient(90deg,#005A2D,#00963A,#E8F5EE);}

/* Info table */
.tbl{width:100%;border-collapse:collapse;font-size:11px;}
.tbl td{padding:5px 8px;border:1px solid #E8E8E8;}
.tbl .lc{background:#F2FAF5;color:#005A2D;font-weight:600;width:32%;}
.tbl .vc{color:#333;}
.tbl th{background:#007A3E;color:#fff;padding:5px 8px;font-size:10px;font-weight:600;}
.tbl tbody tr:hover td{background:#F9FDFB;}

/* Info block */
.info-block{background:#F2FAF5;border-left:3px solid #007A3E;border-radius:0 3px 3px 0;
  padding:7px 10px;margin-bottom:7px;}
.info-block-title{font-size:10px;font-weight:700;color:#005A2D;margin-bottom:3px;}
.info-block-body{font-size:10px;color:#444;line-height:1.55;}

/* Policy block */
.policy-block{background:#F5FBF7;border-left:3px solid #007A3E;border-radius:0 3px 3px 0;
  padding:6px 10px;margin-bottom:7px;}
.policy-title{font-size:10px;font-weight:700;color:#005A2D;margin-bottom:3px;}
.policy-content{font-size:9px;color:#555;line-height:1.55;}

/* Metric cards */
.mcard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.mcard{background:#fff;border:1px solid #D5E6DC;border-top:3px solid #007A3E;
  border-radius:3px;padding:9px 10px;text-align:center;}
.mcard-val{font-size:18px;font-weight:800;color:#007A3E;}
.mcard-lbl{font-size:9px;color:#8C8C8C;margin-top:2px;}

/* Image placeholder — overflow:hidden + absolute img for reliable cropping */
.img-ph{background:#F5FAF7;border:1.5px dashed #B8DECA;border-radius:3px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#A0C0AE;font-size:10px;gap:4px;
  position:relative;overflow:hidden;}
.img-ph img{position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center center;border-radius:2px;}
/* Image with caption wrapper */
.img-wrap{display:flex;flex-direction:column;gap:0;}
.img-cap{font-size:8px;color:#8C8C8C;text-align:center;padding:2px 0;
  background:#F9FDFB;border:1px solid #E0EAE5;border-top:none;
  border-radius:0 0 3px 3px;flex-shrink:0;}

/* Cooperation steps */
.coop-step{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.step-num{min-width:20px;height:20px;border-radius:50%;background:#007A3E;color:#fff;
  font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-text{font-size:10px;color:#333;line-height:1.5;}

/* Sum row */
.sum-row td{background:#EAF5EE;font-weight:700;color:#005A2D;border-top:2px solid #007A3E;}

/* Cover slide */
.cover-slide{height:100%;background:#007A3E;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:28px;position:relative;overflow:hidden;}
.cover-geo1{position:absolute;top:-50px;right:-50px;width:200px;height:200px;
  border-radius:50%;background:rgba(255,255,255,.05);}
.cover-geo2{position:absolute;top:-20px;right:-20px;width:140px;height:140px;
  border-radius:50%;background:rgba(255,255,255,.04);}
.cover-geo3{position:absolute;bottom:-60px;left:-40px;width:220px;height:220px;
  border-radius:50%;background:rgba(0,0,0,.06);}
.cover-strip{position:absolute;bottom:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,#FFD700 0%,#FFF 30%,rgba(255,255,255,0) 70%);}
.cover-logo-ph{width:72px;height:72px;border-radius:8px;
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:14px;}
.cover-company{font-size:11px;color:rgba(255,255,255,.7);margin-bottom:5px;letter-spacing:.05em;}
.cover-divider{width:60px;height:1px;background:rgba(255,255,255,.3);margin:10px auto;}
.cover-title{font-size:19px;font-weight:800;color:#fff;line-height:1.35;margin-bottom:10px;letter-spacing:.02em;}
.cover-tag{display:inline-block;padding:3px 10px;background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);border-radius:2px;font-size:9px;color:rgba(255,255,255,.85);margin:2px;}
.cover-date{position:absolute;bottom:12px;right:18px;font-size:9px;color:rgba(255,255,255,.45);}

/* Revenue summary card */
.rev-total{background:#007A3E;border-radius:4px;padding:14px 16px;text-align:center;margin-top:8px;}
.rev-total-lbl{font-size:9px;color:rgba(255,255,255,.7);margin-bottom:4px;}
.rev-total-val{font-size:24px;font-weight:800;color:#fff;}
.rev-item{background:#fff;border:1px solid #D5E6DC;border-top:2px solid #007A3E;
  border-radius:3px;padding:8px 10px;margin-bottom:7px;}
.rev-item-lbl{font-size:9px;color:#007A3E;font-weight:700;margin-bottom:3px;}
.rev-item-formula{font-size:9px;color:#666;line-height:1.4;margin-bottom:4px;}
.rev-item-val{font-size:15px;font-weight:800;color:#007A3E;}

/* Doc status */
.doc-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:3px;
  border:1px solid #E8E8E8;margin-bottom:5px;}
.doc-row.ok{background:#F2FAF5;border-color:#B8DECA;}
.doc-row.wip{background:#FFFBF0;border-color:#F5D87A;}
.doc-row.no{background:#FFF5F5;border-color:#F0BABA;}

/* ========== FORM PANEL ========== */
.form-panel{width:340px;background:#FAFCFB;border-left:1px solid #D5E6DC;
  overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;}
.fp-hdr{padding:10px 14px;background:#007A3E;color:#fff;
  font-size:12px;font-weight:600;flex-shrink:0;letter-spacing:.02em;}
.fp-sec{padding:11px 14px;border-bottom:1px solid #EBF2EE;}
.fp-sec-title{font-size:10px;color:#007A3E;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:9px;font-weight:700;}
.fg{margin-bottom:9px;}
.fl{display:block;font-size:10px;color:#595959;margin-bottom:3px;font-weight:500;}
.fi{width:100%;padding:6px 9px;background:#fff;border:1px solid #D0D0D0;
  border-radius:3px;color:#262626;font-size:11px;font-family:inherit;transition:border .18s;}
.fi:focus{outline:none;border-color:#007A3E;box-shadow:0 0 0 2px rgba(0,122,62,.1);}
.fi.ta{resize:vertical;min-height:54px;}
.fi.sm{min-height:36px;}

/* Upload */
.upload-btn{width:100%;padding:10px;background:#fff;border:1.5px dashed #B8DECA;
  border-radius:3px;text-align:center;cursor:pointer;transition:all .18s;color:#8C8C8C;font-size:11px;}
.upload-btn:hover{border-color:#007A3E;color:#007A3E;background:#F2FAF5;}
.upload-btn.has-img{border-style:solid;border-color:#007A3E;background:#F2FAF5;}
.upload-preview{max-width:100%;max-height:70px;object-fit:contain;display:block;
  margin:4px auto 0;border-radius:2px;}

/* Dynamic rows */
.dyn-row{background:#fff;border:1px solid #E0EAE5;border-radius:3px;padding:8px;margin-bottom:7px;}
.dyn-row-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.dyn-row-lbl{font-size:10px;color:#8C8C8C;}
.del-btn{width:18px;height:18px;border-radius:2px;background:#FFF0F0;border:none;
  color:#CC3333;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;}
.del-btn:hover{background:#FFD5D5;}
.add-btn{width:100%;padding:6px;background:#fff;border:1px dashed #B8DECA;
  border-radius:3px;color:#007A3E;cursor:pointer;font-size:11px;transition:all .18s;font-weight:500;}
.add-btn:hover{border-color:#007A3E;background:#EAF5EE;}

/* Calc display */
.calc-box{background:#EAF5EE;border:1px solid #B8DECA;border-radius:3px;padding:7px 10px;
  font-size:11px;color:#005A2D;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.calc-lbl{font-size:9px;color:#6B8E7A;font-weight:400;}
.calc-total{background:#007A3E;border-radius:3px;padding:9px 12px;
  display:flex;justify-content:space-between;align-items:center;}
.calc-total-lbl{font-size:10px;color:rgba(255,255,255,.7);}
.calc-total-val{font-size:15px;font-weight:800;color:#fff;}

/* Buttons */
.btn{padding:6px 14px;border-radius:3px;border:none;cursor:pointer;
  font-size:11px;font-family:inherit;font-weight:600;transition:all .18s;
  display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:#007A3E;color:#fff;}
.btn-primary:hover{background:#005A2D;}
.btn-secondary{background:#fff;color:#007A3E;border:1px solid #007A3E;}
.btn-secondary:hover{background:#EAF5EE;}
.btn-ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.3);}
.btn-ghost:hover{background:rgba(255,255,255,.22);}
.btn-sm{padding:5px 11px;font-size:11px;}

/* Full screen preview */
#preview-modal{display:none;position:fixed;inset:0;background:#1a1a1a;z-index:200;flex-direction:column;}
.pm-hdr{height:48px;background:#007A3E;border-bottom:2px solid #005A2D;display:flex;
  align-items:center;padding:0 18px;gap:12px;flex-shrink:0;}
.pm-body{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:auto;background:#1a1a1a;}
.pm-slide{width:100%;max-width:1200px;aspect-ratio:16/9;background:#fff;position:relative;overflow:hidden;
  border-radius:2px;box-shadow:0 8px 40px rgba(0,0,0,.6);color:#1a1a1a;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#F0F4F1;}
::-webkit-scrollbar-thumb{background:#B8DECA;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#007A3E;}
/* ========== PROJECT DASHBOARD ========== */
#dashboard{display:none;flex:1;overflow-y:auto;padding:32px 40px;background:#F0F4F1;}
.dash-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.dash-title{font-size:20px;font-weight:700;color:#004E28;}
.dash-subtitle{font-size:12px;color:#7A9E8C;margin-top:2px;}
.dash-new-btn{background:#007A3E;color:#fff;border:none;border-radius:6px;
  padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:background .15s;}
.dash-new-btn:hover{background:#005A2D;}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.proj-card{background:#fff;border:1.5px solid #D6EBE1;border-radius:8px;padding:18px 18px 14px;
  transition:box-shadow .15s,border-color .15s;position:relative;overflow:hidden;}
.proj-card:not(.proj-card-archived):hover{box-shadow:0 4px 16px rgba(0,122,62,.12);border-color:#007A3E;}
.proj-card-accent{position:absolute;left:0;top:0;bottom:0;width:4px;background:#007A3E;border-radius:4px 0 0 4px;}
.proj-card-name{font-size:14px;font-weight:700;color:#004E28;margin-bottom:4px;padding-left:6px;line-height:1.4;}
.proj-card-cap{font-size:11px;color:#007A3E;font-weight:600;padding-left:6px;margin-bottom:6px;}
.proj-card-meta{font-size:10px;color:#9AB;padding-left:6px;margin-bottom:12px;}
.proj-card-actions{display:flex;gap:6px;padding-left:4px;}
.proj-btn{border:1px solid #D6EBE1;border-radius:4px;padding:4px 10px;font-size:11px;
  cursor:pointer;background:#fff;color:#555;transition:all .12s;}
.proj-btn:hover{background:#EAF5EE;border-color:#007A3E;color:#007A3E;}
.proj-btn-open{background:#007A3E;color:#fff;border-color:#007A3E;}
.proj-btn-open:hover{background:#005A2D;}
.proj-btn-arch{color:#E87722;border-color:#F5D5B0;}
.proj-btn-arch:hover{background:#FFF7EE;border-color:#E87722;}
.proj-btn-restore{color:#007A3E;border-color:#B8DECA;}
.proj-empty{text-align:center;padding:60px 20px;color:#B0C8BC;}
.proj-empty-icon{font-size:48px;margin-bottom:12px;}
.proj-arch-section{margin-top:28px;border-top:1px dashed #D6EBE1;padding-top:16px;}
.proj-arch-title{font-size:11px;color:#9AB;margin-bottom:12px;cursor:pointer;user-select:none;}
.proj-card-archived{opacity:.6;border-style:dashed;}
.proj-card-archived .proj-card-accent{background:#B0C8BC;}
.btn-back{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);
  border-radius:4px;padding:5px 12px;font-size:11px;cursor:pointer;display:none;}
.btn-back:hover{background:rgba(255,255,255,.25);}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-logo">
    <div class="hdr-logo-icon">⚡</div>
    <div>
      <div class="hdr-logo-text">储能项目上会材料在线生成系统</div>
      <div class="hdr-logo-sub">电网侧独立共享储能电站 · 投资决策委员会</div>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="btn-back" id="btnBack" onclick="backToDashboard()">← 项目列表</button>
    <span class="hdr-slide-info" id="hdrInfo"></span>
    <button class="btn btn-ghost btn-sm" id="btnPreview" onclick="previewAll()">👁 全屏预览</button>
    <button class="btn btn-ghost btn-sm" id="btnExport" onclick="exportHTML()">📋 生成报告</button>
    <button class="btn btn-ghost btn-sm" id="btnPrint" onclick="printAll()">🖨 打印/导出</button>
  </div>
</header>

<!-- PROJECT DASHBOARD -->
<div id="dashboard">
  <div class="dash-topbar">
    <div>
      <div class="dash-title">📂 项目管理</div>
      <div class="dash-subtitle">所有项目数据本地保存，永久保留</div>
    </div>
    <button class="dash-new-btn" onclick="createNewProject()">＋ 新建项目</button>
  </div>
  <div class="proj-grid" id="projGrid"></div>
  <div class="proj-arch-section" id="archSection" style="display:none;">
    <div class="proj-arch-title" onclick="toggleArchived()">▼ 已归档项目（点击展开）</div>
    <div class="proj-grid" id="archGrid" style="display:none;margin-top:8px;"></div>
  </div>
</div>

<div class="app-body" id="appBody">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-label">上会大纲</div>
  <div id="slideNav"></div>
  <div class="sb-divider"></div>
  <div class="sb-progress">
    <div class="sb-prog-bar"><div class="sb-prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="sb-prog-txt" id="progTxt">填写进度 0%</div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="toolbar">
    <button class="btn btn-secondary btn-sm" onclick="prevSlide()">◀ 上一页</button>
    <div class="tb-dots" id="tbDots"></div>
    <button class="btn btn-secondary btn-sm" onclick="nextSlide()">下一页 ▶</button>
    <div class="tb-sep"></div>
    <span class="tb-info" id="tbInfo"></span>
  </div>
  <div class="editor">
    <div class="canvas-area">
      <div class="slide-wrap">
        <div class="slide-outer">
          <div class="slide-inner" id="slideCanvas"></div>
        </div>
      </div>
    </div>
    <div class="form-panel" id="formPanel"></div>
  </div>
</main>

</div>

<!-- PREVIEW MODAL -->
<div id="preview-modal">
  <div class="pm-hdr">
    <button class="btn btn-ghost btn-sm" onclick="prevPM()">◀ 上一页</button>
    <span style="font-size:11px;color:rgba(255,255,255,.7);" id="pmInfo"></span>
    <button class="btn btn-ghost btn-sm" onclick="nextPM()">下一页 ▶</button>
    <div style="flex:1"></div>
    <button class="btn btn-ghost btn-sm" onclick="printAll()">🖨 打印</button>
    <button class="btn btn-ghost btn-sm" onclick="closePM()">✕ 关闭</button>
  </div>
  <div class="pm-body">
    <div class="pm-slide" id="pmSlide"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  DATA MODEL
// ══════════════════════════════════════════════

const $=id=>document.getElementById(id);
const v=(val,ph='—')=>val&&String(val).trim()?val:`<span style="color:#C0C0C0;font-style:italic">${ph}</span>`;
const num=(val,unit='',ph='—')=>val?val+unit:ph;
function projectShortName(){
  const d=D.s0;
  if(d.projectName) return d.projectName;
  return (d.province||'')+(d.city||'')+(d.district||'')+(d.powerMW?d.powerMW+'MW/':'')+(d.capacityMWh?d.capacityMWh+'MWh储能电站':'（项目名称）');
}
function calcConsult(rate,mwh){
  if(!rate||!mwh) return '';
  return (parseFloat(rate)*parseFloat(mwh)*100).toFixed(0);
}
function calcLandTotal(unitPrice,area){
  if(!unitPrice||!area) return '';
  return (parseFloat(unitPrice)*parseFloat(area)).toFixed(0);
}
function calcPFR(days,power,times,price,perf){
  if(!days||!power||!times||!price||!perf) return '';
  return (parseFloat(power)*parseFloat(times)*parseFloat(price)*parseFloat(perf)*parseFloat(days)/10000).toFixed(2);
}
function calcEM(capacity,roundTrip,peakPrice,valleyPrice,days,times){
  if(!capacity||!roundTrip||!peakPrice||!valleyPrice||!days) return '';
  const cap=parseFloat(capacity)*1000*(parseFloat(times)||1);
  return ((cap*(parseFloat(roundTrip)/100)*parseFloat(peakPrice)-cap*parseFloat(valleyPrice))*parseFloat(days)/10000).toFixed(2);
}
function calcCapVal(power,standard,coeff){
  if(!power||!standard) return null;
  return (parseFloat(power)*1000*parseFloat(standard)/10000*(parseFloat(coeff)||1)).toFixed(2);
}
function calcCostTotal(){
  return D.s9.rows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
}
function escAttr(s){return String(s||'').replace(/"/g,'&quot;');}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  // Build connection bullets from D.s4 structured data
  const s4conn=D.s4;

  if(s4conn.undergroundLength) connParts.push(`地埋电缆 ${s4conn.undergroundLength} km`);

  const connLines=connParts.length
    ? connParts
    : (s1.connectionDesc||'').split(/[,，\n]/).map(l=>l.trim()).filter(Boolean);

  // Land cost section
  const landSect=sect('占地面积与成本',`
    <div style="display:flex;align-items:baseline;gap:5px;margin-bottom:3px;">

  // Grid connection section
  const connSect=sect('电网接入优势',
    connLines.length
      ? connLines.map(l=>bullet('⚡',l)).join('')

  // Site conditions section
  const siteSect=sect('场地条件',`

  const photoStrip=sitePhotos.length?`
    <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:4px;margin-top:auto;padding-top:6px;flex-shrink:0;">

        <div style="height:44px;border-radius:3px;overflow:hidden;position:relative;border:1px solid #D6EBE1;">
          <img src="${p.url}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">

      ${connSect}
      ${siteSect}
      ${photoStrip}
    </div>

    <!-- RIGHT: satellite / map image -->
    <div style="position:relative;border-radius:4px;overflow:hidden;border:1.5px solid #D6EBE1;height:100%;">
      ${d.mapUrl
        ?`<img src="${d.mapUrl}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">`
        :`<div class="img-ph" style="position:absolute;inset:0;border-radius:3px;border:none;">

           <span style="font-size:10px;">区位图 / 卫星地图</span>

function renderS9(){
  const d=D.s9;
  const s1=D.s1;
  const s8=D.s8;
  // Auto values from upstream — land from s1, consult from s8 (合作条件) with s1 fallback
  const autoLand    = calcLandTotal(s1.landUnitPrice,s1.landArea);
  const consultRate = s8.consultRate||s1.consultRate;
  const consultMWh  = s8.consultMWh||s1.consultMWh;
  const autoConsult = calcConsult(consultRate,consultMWh);
  const validNum=v=>v&&v!='NaN'&&!isNaN(parseFloat(v));

  // Augment rows: override scale+amount for land/consult rows
  const augment=r=>{
    const nm=(r.name||'');
    if(nm.includes('土地')&&validNum(autoLand)){
      const scale=s1.landArea&&s1.landUnitPrice?`${s1.landArea}亩 × ${s1.landUnitPrice}万元/亩`:r.scale;
      return {...r,scale,amount:autoLand,_auto:true};
    }
    if((nm.includes('资源')||nm.includes('咨询'))&&validNum(autoConsult)){
      const scale=consultRate&&consultMWh?`${consultRate}元/Wh × ${consultMWh}MWh`:r.scale;
      return {...r,scale,amount:autoConsult,_auto:true};
    }
    return r;
  };

  const rows=d.rows.filter(r=>r.name||r.amount).map(augment);
  // Recalculate total from augmented rows
  const total=rows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);

  return shell('六','项目经济性分析（费用）',`
  <div style="height:calc(100% - 8px);">
    <div style="font-size:10px;color:#007A3E;font-weight:600;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #D5E6DC;">

    <table class="tbl" style="font-size:11px;">
      <thead>
        <tr><th style="width:8%;">序号</th><th style="width:28%;">费用名称</th><th style="width:37%;">建设规模</th><th style="width:27%;">金额（万元）</th></tr>
      </thead>
      <tbody>
        ${rows.length?rows.map(r=>`
          <tr>
            <td class="vc" style="text-align:center;">${r.seq}</td>
            <td class="vc">${r.name||'—'}</td>
            <td class="vc" style="font-size:9px;color:#666;">${r.scale||'—'}</td>
            <td class="vc" style="font-weight:700;color:#007A3E;">
              ${r.amount||'—'}
              ${r._auto?`<span style="font-size:7px;color:#A0C0AE;margin-left:3px;" title="自动引用前文数据">↗自动</span>`:''}
            </td>
          </tr>`).join('')
        :`<tr><td colspan="4" style="text-align:center;color:#C0C0C0;font-style:italic;padding:18px;">请在右侧添加费用明细</td></tr>`}
        ${total?`<tr class="sum-row">
          <td style="text-align:center;padding:6px 8px;">合计</td>
          <td colspan="2"></td>
          <td style="font-size:14px;padding:6px 8px;">${total.toFixed(0)}&nbsp;万元</td>
        </tr>`:''}
      </tbody>
    </table>
  </div>`);
}

function fi(key,sk,ph,type='text'){
  const val=(D[sk]&&D[sk][key]!==undefined)?D[sk][key]:'';
  return `<input class="fi" type="${type}" placeholder="${ph}" value="${escAttr(val)}"
    onchange="upd('${sk}','${key}',this.value)" oninput="upd('${sk}','${key}',this.value)">`;
}
function ta(key,sk,ph,rows=2){
  const val=(D[sk]&&D[sk][key]!==undefined)?D[sk][key]:'';
  return `<textarea class="fi ta sm" style="min-height:${rows*22+12}px" placeholder="${ph}"
    onchange="upd('${sk}','${key}',this.value)" oninput="upd('${sk}','${key}',this.value)">${escHtml(val)}</textarea>`;
}
function sel(key,sk,opts){
  const val=(D[sk]&&D[sk][key]!==undefined)?D[sk][key]:'';
  return `<select class="fi" onchange="upd('${sk}','${key}',this.value)">
    ${opts.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}
  </select>`;
}
function fg(lbl,inp){return `<div class="fg"><label class="fl">${lbl}</label>${inp}</div>`;}
function sec(title,content){return `<div class="fp-sec"><div class="fp-sec-title">${title}</div>${content}</div>`;}
function uploadFG(lbl,sk,fk){
  const url=D[sk]&&D[sk][fk+'Url']?D[sk][fk+'Url']:'';
  return `<div class="fg"><label class="fl">${lbl}</label>
    <div class="upload-btn ${url?'has-img':''}" onclick="trigUpload('${sk}','${fk}')">
      ${url?`<img class="upload-preview" src="${url}"><div style="font-size:9px;color:#007A3E;margin-top:3px;">✅ 已上传 — 点击更换</div>`
           :`<div>📁 点击上传图片</div>`}
    </div>
    <input type="file" accept="image/*" id="upf_${sk}_${fk}" style="display:none" onchange="handleUp('${sk}','${fk}',this)">
  </div>`;
}
function calcBox(lbl,val,unit='万元'){
  return `<div class="calc-box"><span class="calc-lbl">${lbl}</span><span>${val?val+' '+unit:'待计算...'}</span></div>`;
}
function calcTotalBox(lbl,val){
  return `<div class="calc-total"><span class="calc-total-lbl">${lbl}</span><span class="calc-total-val">${val||'—'}</span></div>`;
}

  const d=D.s10;
  const pfr=calcPFR(d.pfrDays,d.pfrPower,d.pfrTimes,d.pfrPrice,d.pfrPerf);
  const em=calcEM(d.emCapacity,d.emRoundTrip,d.emPeakPrice,d.emValleyPrice,d.emDays,d.emTimes);

function renderNav(){
  $('slideNav').innerHTML=SLIDES.map((s,i)=>`
    <div class="sli-item ${i===curIdx?'active':''}" onclick="goTo(${i})">
      <div class="sli-num">${s.num}</div>

  $('hdrInfo').textContent=`第 ${curIdx+1} 页 / 共 ${SLIDES.length} 页`;

function updateProgress(){
  let filled=0,total=0;
  const check=obj=>{if(!obj)return;Object.values(obj).forEach(v=>{if(typeof v==='string'){total++;if(v.trim())filled++;}});};
  ['s0','s1','s3','s4','s5','s7','s8'].forEach(k=>check(D[k]));
  const pct=total>0?Math.round(filled/total*100):0;
  $('progFill').style.width=pct+'%';
  $('progTxt').textContent='填写进度 '+pct+'%';
}

document.addEventListener('keydown',e=>{
  if($('preview-modal').style.display==='flex'){
    if(e.key==='ArrowLeft')prevPM();
    if(e.key==='ArrowRight')nextPM();
    if(e.key==='Escape')closePM();
  } else {
    const tag=document.activeElement.tagName.toLowerCase();
    if(tag==='input'||tag==='textarea'||tag==='select') return;
    if(e.key==='ArrowLeft')prevSlide();
    if(e.key==='ArrowRight')nextSlide();
  }
});

// ══════════════════════════════════════════════
//  PROJECT MANAGEMENT (localStorage)
// ══════════════════════════════════════════════
const PM_KEY='yichu_projects';
let currentProjectId=null;

function pmLoad(){return JSON.parse(localStorage.getItem(PM_KEY)||'{"projects":[]}');}
function pmSave(store){localStorage.setItem(PM_KEY,JSON.stringify(store));}

function getProjects(includeArchived=false){
  return pmLoad().projects.filter(p=>includeArchived||!p.deleted);
}

// Deep clone D as default data for new project
function defaultData(){return JSON.parse(JSON.stringify(D));}

function createNewProject(){
  const name=prompt('请输入项目名称：','新储能项目');
  if(!name||!name.trim()) return;
  const store=pmLoad();
  const id='p_'+Date.now();
  store.projects.unshift({
    id, name:name.trim(),
    createdAt:new Date().toLocaleDateString('zh-CN'),
    updatedAt:new Date().toLocaleDateString('zh-CN'),
    deleted:false,
    data:defaultData()
  });
  pmSave(store);
  openProject(id);
}

function openProject(id){
  const store=pmLoad();
  const proj=store.projects.find(p=>p.id===id);
  if(!proj) return;
  currentProjectId=id;
  // Load project data into D
  Object.keys(D).forEach(k=>{if(proj.data[k])Object.assign(D[k],proj.data[k]);});
  // Switch to editor view
  $('dashboard').style.display='none';
  $('appBody').style.display='flex';
  $('btnBack').style.display='inline-block';
  ['btnPreview','btnExport','btnPrint'].forEach(b=>$(b).style.display='');
  $('hdrInfo').style.display='';
  goTo(0); refresh(); refreshForm(); updateProgress();
}

function saveCurrentProject(){
  if(!currentProjectId) return;
  const store=pmLoad();
  const idx=store.projects.findIndex(p=>p.id===currentProjectId);
  if(idx===-1) return;
  store.projects[idx].data=JSON.parse(JSON.stringify(D));
  store.projects[idx].updatedAt=new Date().toLocaleDateString('zh-CN');
  // auto-update name if project name matches placeholder
  const projName=D.s1&&D.s1.address?'':store.projects[idx].name;
  if(D.s0&&D.s0.projectName&&D.s0.projectName!==store.projects[idx].name){
    // keep user-set project name unless it's a new placeholder
  }
  pmSave(store);
}

function archiveProject(id,e){
  e&&e.stopPropagation();
  if(!confirm('归档后项目将移至已归档区，数据永久保留，可随时恢复。确认归档？')) return;
  const store=pmLoad();
  const p=store.projects.find(q=>q.id===id);
  if(p) p.deleted=true;
  pmSave(store);
  renderDashboard();
}

function restoreProject(id,e){
  e&&e.stopPropagation();
  const store=pmLoad();
  const p=store.projects.find(q=>q.id===id);
  if(p) p.deleted=false;
  pmSave(store);
  renderDashboard();
}

function renameProject(id,e){
  e&&e.stopPropagation();
  const store=pmLoad();
  const p=store.projects.find(q=>q.id===id);
  if(!p) return;
  const name=prompt('修改项目名称：',p.name);
  if(name&&name.trim()){p.name=name.trim();pmSave(store);renderDashboard();}
}

function backToDashboard(){
  saveCurrentProject();
  currentProjectId=null;
  $('appBody').style.display='none';
  $('dashboard').style.display='block';
  $('btnBack').style.display='none';
  ['btnPreview','btnExport','btnPrint'].forEach(b=>$(b).style.display='none');
  $('hdrInfo').style.display='none';
  renderDashboard();
}

function renderDashboard(){
  const active=getProjects(false);
  const archived=getProjects(true).filter(p=>p.deleted);
  const grid=$('projGrid');
  const cap=p=>{
    const d=p.data&&p.data.s1;
    return d&&d.powerMW?`${d.powerMW}MW / ${d.capacityMWh||'—'}MWh`:'规模待填写';
  };
  const cardHtml=(p,isArch=false)=>`
    <div class="proj-card ${isArch?'proj-card-archived':''}">
      <div class="proj-card-accent"></div>
      <div class="proj-card-name">${p.name}</div>
      <div class="proj-card-cap">⚡ ${cap(p)}</div>
      <div class="proj-card-meta">更新 ${p.updatedAt} · 建立 ${p.createdAt}</div>
      <div class="proj-card-actions">
        ${isArch
          ?`<button class="proj-btn proj-btn-restore" onclick="restoreProject('${p.id}',event)">↩ 恢复</button>`
          :`<button class="proj-btn proj-btn-open" onclick="openProject('${p.id}')">📂 打开</button>
            <button class="proj-btn" onclick="renameProject('${p.id}',event)">✏️ 改名</button>
            <button class="proj-btn proj-btn-arch" onclick="archiveProject('${p.id}',event)">📦 归档</button>`}
      </div>
    </div>`;
  grid.innerHTML=active.length
    ?active.map(p=>cardHtml(p)).join('')
    :`<div class="proj-empty"><div class="proj-empty-icon">📋</div><div>暂无项目，点击右上角「新建项目」开始</div></div>`;
  // Archived section
  const archSec=$('archSection');
  if(archived.length){
    archSec.style.display='block';
    $('archGrid').innerHTML=archived.map(p=>cardHtml(p,true)).join('');
  } else {
    archSec.style.display='none';
  }
}

let archVisible=false;
function toggleArchived(){
  archVisible=!archVisible;
  const g=$('archGrid');
  const t=document.querySelector('.proj-arch-title');
  g.style.display=archVisible?'grid':'none';
  t.textContent=(archVisible?'▲':'▼')+' 已归档项目（点击'+(archVisible?'收起':'展开')+'）';
